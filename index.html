<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social-links-profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/images/favicon-32x32.png" type="image/x-icon">
</head>
<body>
    <main>
        <article class="profile-card">
            <img src="assets/images/avatar-jessica.jpeg" alt="avatar-jessica">
            <div class="content">
                <h1>Jessica Randall</h1>
                <h2>London, United Kingdom</h2>
                <p>“Front-end developer and avid reader.”</p>
            </div>
            <div class="link-section">
                <span class="github containers">Github</span>
                <span class="Fronted-Mentor containers">Fronted Mentor</span>
                <span class="Linkdin containers">Linkdin</span>
                <span class="Twitter containers">Twitter</span>
                <span class="instagram containers">instagram</span>
            </div>
        </article>
    </main>
</body>
</html>
